name: Dependency Scan

on:
    #workflow_call:
    workflow_dispatch:

jobs:
    dependency-check:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout 
              uses: actions/checkout@v4

            - name: Setup java
              uses: actions/setup-java@v4
              with:
                distribution: 'temurin'
                java-version: '21'
                cache: maven
                
            # This downloads all dependencies so they can be scanned
            - name: Resolve Dependencies
              run: mvn dependency:resolve --no-transfer-progress

            # Fails the build if "high" or "critical" vulnerabilities are found
            - name: Run OWASP Dependency Check
              run: mvn dependency-check:check --no-transfer-progress
            
            - name: Upload Dependency Check Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: dependency-check-report
                path: target/dependency-check-report.html
                retention-days: 7